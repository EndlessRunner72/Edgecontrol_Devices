<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Fleet Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 30px; background: #f4f4f4; }
        /* Status Bar Styling */
        #status { margin-bottom: 30px; font-weight: bold; font-size: 16px; color: #666; }
        /* Container for multiple cards */
        #dashboard-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        /* Individual Card Styling */
        .card { background: white; padding: 30px; border-radius: 15px; min-width: 200px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .clickLabel { font-size: 60px; color: #0078d4; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>
    
    <div id="status">🔄 Initializing Connection...</div>

    <div id="dashboard-container"></div>

    <script>
        // 1. CONFIGURATION
        const hubName = "edgecontrol-hub-2026";
        const deviceId = "web-dashboard-01";
        const sasToken = "SharedAccessSignature sr=edgecontrol-hub-2026.azure-devices.net%2Fdevices%2Fweb-dashboard-01&sig=rbvvOYCX5dZDqV7r7LrUrF7rEoG1W9GKZqqdSLl922o%3D&se=1806135184"; 

        const host = `wss://${hubName}.azure-devices.net:443/$iothub/websocket?iothub-no-client-cert=true`;

        const options = {
            clientId: deviceId,
            username: `${hubName}.azure-devices.net/${deviceId}/?api-version=2021-04-12`,
            password: sasToken,
            protocol: 'wss',
            protocolVersion: 4,
            clean: true,
            rejectUnauthorized: false
        };

        const client = mqtt.connect(host, options);

        // 2. STATUS UPDATES
        client.on('connect', () => {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Connected to Azure ✅";
            statusDiv.style.color = "green";
            client.subscribe(`devices/${deviceId}/messages/devicebound/#`);
        });

        client.on('error', (err) => {
            document.getElementById('status').innerText = "❌ Connection Error: " + err.message;
            document.getElementById('status').style.color = "red";
        });

        client.on('offline', () => {
            document.getElementById('status').innerText = "⚠️ Status: Offline (Trying to reach Azure...)";
            document.getElementById('status').style.color = "orange";
        });

        // 3. MULTI-DEVICE MESSAGE LOGIC
        client.on('message', (topic, message) => {
            try {
                const payload = JSON.parse(message.toString());
                const { buttonClicks, senderId } = payload; // Logic App must send these keys

                if (senderId && buttonClicks !== undefined) {
                    let card = document.getElementById(`card-${senderId}`);

                    // Create card if it doesn't exist
                    if (!card) {
                        card = document.createElement('div');
                        card.id = `card-${senderId}`;
                        card.className = 'card';
                        card.innerHTML = `
                            <h3 style="color: #444; margin-bottom: 0;">Device</h3>
                            <small style="color: #888;">${senderId}</small>
                            <div id="label-${senderId}" class="clickLabel">--</div>
                            <p style="margin: 0; color: #666;">Total Clicks</p>
                        `;
                        document.getElementById('dashboard-container').appendChild(card);
                    }

                    // Update label with "Greater Than" check
                    const label = document.getElementById(`label-${senderId}`);
                    const currentCount = parseInt(label.innerText) || 0;

                    if (buttonClicks > currentCount) {
                        label.innerText = buttonClicks;
                    }
                }
            } catch (e) {
                console.error("Data Parse Error:", e);
            }
        });
    </script>
</body>
</html>
