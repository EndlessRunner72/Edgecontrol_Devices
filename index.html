<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Button Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #clickLabel { font-size: 60px; color: #0078d4; font-weight: bold; margin: 20px 0; }
        #status { color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>ESP32 Live Counter</h2>
        <div id="clickLabel">--</div>
        <p>Total Clicks</p>
        <div id="status">Connecting to Azure...</div>
    </div>

    <script>
        // 1. CONFIGURATION
        const hubName = "edgecontrol-hub-2026";
        const deviceId = "web-dashboard-01";
        const sasToken = "SharedAccessSignature sr=edgecontrol-hub-2026.azure-devices.net%2Fdevices%2Fweb-dashboard-01&sig=dehLs%2FgRfoX%2BWeOV1ULqXCeS6i7tM1VW1iiPI0JB4WA%3D&se=1806036429"; 

        const host = `wss://${hubName}.azure-devices.net:443/$iothub/websocket?iothub-no-client-cert=true`;

        const options = {
            clientId: deviceId,
            username: `${hubName}.azure-devices.net/${deviceId}?api-version=2021-04-12`,
            password: sasToken,
            protocol: 'wss',
            protocolVersion: 4, // Forces MQTT v3.1.1 (Required by Azure)
            clean: true,        // Ensures a fresh session
            rejectUnauthorized: false // Helps bypass some mobile browser cert quirks
        };

        // 2. CONNECTION LOGIC
        const client = mqtt.connect(host, options);

        client.on('connect', () => {
            document.getElementById('status').innerText = "Connected to Azure ✅";
            document.getElementById('status').style.color = "green";
            // This subscribes to messages specifically routed TO this web device
            client.subscribe(`devices/${deviceId}/messages/devicebound/#`);
        });

        client.on('error', (err) => {
            // This will tell us if it's a "Connection Refused" or "Unauthorized" error
            document.getElementById('status').innerText = "❌ Connection Error: " + err.message;
            document.getElementById('status').style.color = "red";
            console.error(err);
        });

        client.on('offline', () => {
            document.getElementById('status').innerText = "⚠️ Status: Offline (Trying to reach Azure...)";
            document.getElementById('status').style.color = "orange";
        });

        client.on('close', () => {
            // If Azure kicks us out, this triggers
            document.getElementById('status').innerText = "🚫 Connection Closed by Azure.";
        });

        client.on('packetreceive', (packet) => {
            if (packet.cmd === 'disconnect') {
                console.log('Azure sent a disconnect packet:', packet);
                document.getElementById('status').innerText = "Azure Disconnected: Reason Code " + packet.reasonCode;
            }
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                if (data.buttonClicks !== undefined) {
                    document.getElementById('clickLabel').innerText = data.buttonClicks;
                }
            } catch (e) {
                console.error("JSON Parse Error", e);
            }
        });
    </script>
</body>
</html>
